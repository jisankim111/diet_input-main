<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사진 업로드 — Diet AI</title>
    <style>
        :root{--bg:#f7f8fa;--surface:#fff;--muted:#6b7280;--accent:#2dd4bf;--accent-dark:#0f766e;--border:#e5e7eb;--radius:16px}
        *{box-sizing:border-box}
        body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:#1f2937}
        .container{max-width:880px;margin:40px auto;padding:24px}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px}
        h1{margin:0 0 8px}
        p.muted{color:var(--muted);margin:0 0 18px}
        .date{font-weight:700;margin-bottom:12px}
        .upload-box{border:1px dashed var(--border);padding:28px;border-radius:12px;text-align:center;background:#fff}
        input[type=file]{display:block;margin:14px auto}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border-radius:12px;border:none;cursor:pointer}
        .btn-primary{background:var(--accent);color:#fff}
        .btn-secondary{background:transparent;border:1px solid var(--border)}
        .hint{color:var(--muted);font-size:0.95rem;margin-top:10px}
        .actions{display:flex;justify-content:flex-end;gap:12px;margin-top:18px}
    </style>
</head>
<body>
    <div class="container">
        <div style="margin-bottom:18px"><a href="/">← 달력으로 돌아가기</a></div>
        <div class="card">
            <h1>식단 사진 업로드</h1>
            <p class="muted">선택한 날짜에 대해 사진을 업로드하면 AI가 분석합니다.</p>
            <div class="date" id="selectedDate">선택된 날짜: —</div>
            <div class="upload-box">
                <div style="font-size:36px">📸</div>
                <div style="margin-top:8px">정면에서 찍은 접시 사진을 업로드하세요.</div>
                <input type="file" id="photoInput" accept="image/*">
                <div class="hint">권장: 흰 접시 / 전체가 보이도록 촬영</div>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" id="cancelBtn">취소</button>
                <button class="btn btn-primary" id="uploadBtn">다음 (업로드)</button>
            </div>
            <div id="status" style="margin-top:12px;color:var(--muted)"></div>
        </div>
    </div>

    <script>
        function parseQuery() {
            const q = Object.fromEntries(new URLSearchParams(location.search));
            return q;
        }
        const q = parseQuery();
        const dateEl = document.getElementById('selectedDate');
        const photoInput = document.getElementById('photoInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const statusEl = document.getElementById('status');
        const date = q.date || new Date().toISOString().slice(0,10);
        dateEl.textContent = '선택된 날짜: ' + new Date(date).toLocaleDateString();

        cancelBtn.addEventListener('click',()=>{ location.href='/' });

        uploadBtn.addEventListener('click', async ()=>{
            const files = photoInput.files;
            if(!files || files.length===0){ alert('사진을 선택해 주세요.'); return; }
            const file = files[0];
            statusEl.textContent = '업로드 및 분석 중... 잠시만 기다려 주세요.';
            try{
                const fd = new FormData();
                fd.append('date', date);
                fd.append('image', file);
                const resp = await fetch('/api/diets/photo', { method:'POST', body: fd });
                if(!resp.ok) throw new Error('업로드 실패');
                // navigate to analysis page
                location.href = '/analysis?date=' + encodeURIComponent(date);
            }catch(err){
                statusEl.textContent = '오류: ' + err.message;
            }
        });
    </script>
</body>
</html>
