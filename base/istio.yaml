apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: diet-public-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: diet-public-route
spec:
  hosts:
    - "*"
  gateways:
    - diet-public-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: diet-gateway-service
            port:
              number: 8080
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: input-service-route
spec:
  hosts:
    - input-service
  http:
    - timeout: 10s
      retries:
        attempts: 1
        perTryTimeout: 5s
        retryOn: connect-failure,refused-stream,unavailable,5xx
      route:
        - destination:
            host: input-service
            port:
              number: 8081
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: analysis-service-route
spec:
  hosts:
    - diet-analysis-service
  http:
    - timeout: 8s
      retries:
        attempts: 1
        perTryTimeout: 4s
        retryOn: connect-failure,refused-stream,unavailable,5xx
      route:
        - destination:
            host: diet-analysis-service
            port:
              number: 8082
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: analysis-service-circuit-breaker
spec:
  host: diet-analysis-service
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 20
      http:
        http1MaxPendingRequests: 10
        maxRequestsPerConnection: 5
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: input-service-traffic-policy
spec:
  host: input-service
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 20
        maxRequestsPerConnection: 10
